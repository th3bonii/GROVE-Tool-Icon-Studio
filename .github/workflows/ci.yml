# CI Pipeline
#
# Trigger: PR to main, push to main.
# Runs lint, typecheck, TypeScript tests, and Rust tests + clippy in parallel.
#
# Conventions:
#   - npm ci for reproducible installs
#   - dtolnay/rust-toolchain + Swatinem/rust-cache for Rust
#   - 15-minute timeout per job

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    continue-on-error: false
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc -b

  test-ts:
    runs-on: ubuntu-latest
    continue-on-error: false
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run

  test-rust:
    runs-on: ubuntu-latest
    continue-on-error: false
    timeout-minutes: 15
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system dependencies
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          libwebkit2gtk-4.1-dev
          libgtk-3-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          libsoup-3.0-dev
          libjavascriptcoregtk-4.1-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo test
      - name: cargo clippy
        run: cargo clippy -- -D warnings
        continue-on-error: true
