# Release Pipeline
#
# Trigger: git tag matching v*
# Builds Tauri bundles (.deb, .AppImage, .dmg) and publishes to GitHub Releases.
#
# Conventions:
#   - Only runs on tags matching v* (e.g., v1.2.3, v0.1.0-rc1)
#   - Uses dtolnay/rust-toolchain + Swatinem/rust-cache for Rust
#   - softprops/action-gh-release creates the GitHub Release
#   - Build failure aborts the release — no partial artifacts

name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: grove-tool-icon-studio_*.deb
            extra_artifacts: "*.AppImage"
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: grove-tool-icon-studio_*.dmg
            extra_artifacts: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: grove-tool-icon-studio_*.msi
            extra_artifacts: "*.exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          libwebkit2gtk-4.1-dev
          libgtk-3-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          libsoup-3.0-dev
          libjavascriptcoregtk-4.1-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri bundles
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/${{ matrix.target == 'x86_64-unknown-linux-gnu' && 'deb' || matrix.target == 'x86_64-apple-darwin' && 'dmg' || 'msi' }}/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.deb
            **/*.AppImage
            **/*.dmg
            **/*.msi
            **/*.exe
          generate_release_notes: true
