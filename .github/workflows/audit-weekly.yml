# Weekly Dependency Audit
#
# Trigger: cron every Monday at 06:00 UTC
# Runs npm audit and cargo audit on a schedule to catch vulnerabilities
# that may have been published since the last PR commit.
#
# Conventions:
#   - Separate from PR CI to avoid blocking development workflows
#   - --ignore flags used for documented false positives
#   - Results reported in Actions log — does not block PRs

name: Weekly Audit

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: weekly-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-npm:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm audit
        # --audit-level=high: only fail on high or critical
        run: npm audit --audit-level=high
        continue-on-error: true

  audit-cargo:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system dependencies
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          libwebkit2gtk-4.1-dev
          libgtk-3-dev
          libayatana-appindicator3-dev
          librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo audit
        # Add --ignore RUSTSEC-XXXX-XXXX here for documented false positives
        # See: docs/advisories.md or inline justification comments
        run: |
          cargo install cargo-audit --locked
          cargo audit
        continue-on-error: true
